spring.application.name=fuel
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fuel_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Srm@2003}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration (Azure AD) - DISABLED FOR DEVELOPMENT
# Uncomment and set AZURE_TENANT_ID and AZURE_CLIENT_ID environment variables to enable
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
# spring.security.oauth2.resourceserver.jwt.audiences=${AZURE_CLIENT_ID}

# Logging
logging.level.org.springframework.security=DEBUG
