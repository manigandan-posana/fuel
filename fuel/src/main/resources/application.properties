spring.application.name=fuel
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fuel_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Srm@2003}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration (Azure AD)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID:7ba6b92d-20e2-4e35-8a6d-1ad937682d1b}/v2.0
spring.security.oauth2.resourceserver.jwt.audiences=${AZURE_CLIENT_ID:33924e78-a487-4a8e-94ff-191421ffea8a}

# Logging
logging.level.org.springframework.security=DEBUG
