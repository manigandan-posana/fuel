spring.application.name=fuel

# H2 In-Memory Database for Development
spring.datasource.url=jdbc:h2:mem:fueldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL initialization (we use JPA to create schema)
spring.sql.init.mode=never

# H2 Console (optional - for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security Configuration (Azure AD) - DISABLED FOR DEVELOPMENT
# Uncomment and set AZURE_TENANT_ID and AZURE_CLIENT_ID environment variables to enable
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
# spring.security.oauth2.resourceserver.jwt.audiences=${AZURE_CLIENT_ID}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
